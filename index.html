<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neftity Music Box</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#dfe3f3;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{width:380px;background:#fff;border-radius:30px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.hero{height:300px;background:linear-gradient(180deg,#4338ff,#2c22d8);display:flex;justify-content:center;align-items:center;color:#fff;font-size:80px}
.content{padding:30px;text-align:center}
h1{color:#22227a;margin-bottom:20px;font-size:40px}
.description{color:#7d8092;line-height:1.6;font-size:18px}
.plan-card{margin-top:30px;background:#f2f2fa;border-radius:20px;padding:20px;display:flex;justify-content:space-between;align-items:center}
.icon{width:60px;height:60px;border-radius:50%;background:#dddaf8;display:flex;justify-content:center;align-items:center;font-size:24px}
.plan-info{flex:1;text-align:left;margin-left:15px}
.btn{width:100%;margin-top:30px;border:none;background:linear-gradient(90deg,#4338ff,#3127dd);color:white;padding:18px;border-radius:40px;font-size:24px;font-weight:bold}
.cancel{margin-top:25px;color:#9da3b2;font-size:22px;font-weight:600}
</style>
</head>
<body>
<div class="container">
<div class="hero">🎧</div>
<div class="content">
<h1>Neftity Music Box</h1>
<p class="description">You can now listen to millions of songs anywhere across the world and podcasts on any device all over the world!</p>
<div class="plan-card">
<div class="icon">🎵</div>
<div class="plan-info"><h3>Weekly Plan</h3><p>$40.99/monthly</p></div>
<a href="#">Change</a>
</div>
<button class="btn">Proceed Payment</button>
<div class="cancel">Decline Order?</div>
</div>
</div>
</body>
</html>
